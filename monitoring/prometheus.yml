# monitoring/prometheus.yml — Prometheus scrape configuration for Enclaiv.

global:
  scrape_interval: 15s       # How frequently to scrape targets.
  evaluation_interval: 15s   # How frequently to evaluate alert rules.
  scrape_timeout: 10s

  external_labels:
    project: enclaiv
    env: local

# ---------------------------------------------------------------------------
# Alert rule files
# ---------------------------------------------------------------------------
rule_files:
  - /etc/prometheus/alerts.yml

# ---------------------------------------------------------------------------
# Alertmanager configuration (optional — configure when deploying)
# ---------------------------------------------------------------------------
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets:
#             - alertmanager:9093

# ---------------------------------------------------------------------------
# Scrape configurations
# ---------------------------------------------------------------------------
scrape_configs:

  # ---------- Proxy ----------------------------------------------------------
  # The Go allowlist proxy exposes Prometheus metrics on :9081/metrics.
  - job_name: enclaiv_proxy
    static_configs:
      - targets:
          - proxy:9081
    metrics_path: /metrics
    scheme: http
    scrape_interval: 10s

  # ---------- Control plane --------------------------------------------------
  # The control-plane API exposes Prometheus metrics on :8080/metrics.
  - job_name: enclaiv_control_plane
    static_configs:
      - targets:
          - control-plane:8080
    metrics_path: /metrics
    scheme: http
    scrape_interval: 15s

  # ---------- Prometheus self-monitoring -------------------------------------
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090
    metrics_path: /metrics
    scheme: http
