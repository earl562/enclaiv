name: CI

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main", "dev"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.22"
  PYTHON_VERSION: "3.11"

# ---------------------------------------------------------------------------
# Jobs
# ---------------------------------------------------------------------------
jobs:

  # --------------------------------------------------------------------------
  # Python — lint, type-check, unit tests
  # --------------------------------------------------------------------------
  test-python:
    name: Python tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install CLI and dev dependencies
        run: pip install -e ".[dev]"

      - name: Ruff lint check
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: mypy type check
        run: mypy enclaiv

      - name: pytest
        run: |
          pytest \
            --cov=enclaiv \
            --cov-report=term-missing \
            --cov-fail-under=80 \
            -q

  # --------------------------------------------------------------------------
  # Go — vet, race-enabled tests, coverage
  # --------------------------------------------------------------------------
  test-go:
    name: Go tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: proxy

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go ${{ env.GO_VERSION }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: go vet
        run: go vet ./...

      - name: go test (race + cover)
        run: go test -race -cover -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage
          path: proxy/coverage.out

  # --------------------------------------------------------------------------
  # Integration — spin up the proxy, build a test agent, verify blocking
  # --------------------------------------------------------------------------
  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: [test-python, test-go]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go ${{ env.GO_VERSION }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install KraftKit (Unikraft CLI)
        run: |
          curl --proto '=https' --tlsv1.2 -sSf \
            https://get.kraftkit.sh | sh
          echo "$HOME/.kraftkit/bin" >> "$GITHUB_PATH"

      - name: Build proxy binary
        run: |
          mkdir -p bin
          CGO_ENABLED=0 go build \
            -trimpath \
            -o bin/enclaiv-proxy \
            ./proxy/cmd/proxy

      - name: Start proxy in background
        run: |
          ./bin/enclaiv-proxy \
            --addr :9080 \
            --metrics-addr :9081 \
            --config proxy/testdata/integration-policy.yaml &
          # Wait for proxy to be ready.
          for i in $(seq 1 10); do
            curl -sf http://localhost:9081/healthz && break || sleep 1
          done

      - name: Build test agent image (kraft)
        run: |
          kraft build \
            --target linux/x86_64 \
            ./templates/python-basic

      - name: Verify proxy blocks unauthorised domain
        run: |
          # Attempt to reach an unlisted domain through the proxy — expect 403.
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --proxy http://localhost:9080 \
            http://example-blocked.invalid/)
          if [ "$STATUS" != "403" ]; then
            echo "Expected 403 from proxy for blocked domain, got $STATUS"
            exit 1
          fi
          echo "Proxy correctly blocked unauthorised domain (HTTP $STATUS)"

  # --------------------------------------------------------------------------
  # Security scan — Trivy vulnerability scan on the proxy Docker image
  # --------------------------------------------------------------------------
  security-scan:
    name: Security scan
    runs-on: ubuntu-latest
    needs: [test-go]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build proxy Docker image
        run: docker build -t enclaiv-proxy:ci ./proxy

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: enclaiv-proxy:ci
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH"

      - name: Upload Trivy SARIF report
        if: always()
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: enclaiv-proxy:ci
          format: sarif
          output: trivy-results.sarif

      - name: Upload SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
