version: "3.9"

# ---------------------------------------------------------------------------
# Enclaiv — local development stack
# ---------------------------------------------------------------------------
# Services:
#   proxy         — Go allowlist proxy (ports 9080 HTTP, 9081 metrics)
#   control-plane — FastAPI control plane; holds API keys, proxies LLM calls (port 8080)
#   db            — PostgreSQL 16 — sessions, messages, audit log (port 5432)
#   prometheus    — Prometheus metrics scraper (port 9090)
#   grafana       — Grafana dashboards (port 3000)
# ---------------------------------------------------------------------------

services:

  # -------------------------------------------------------------------------
  # Allowlist proxy — intercepts all VM outbound traffic.
  # -------------------------------------------------------------------------
  proxy:
    build:
      context: ./proxy
      dockerfile: Dockerfile
    ports:
      - "9080:9080"   # HTTP CONNECT proxy
      - "9081:9081"   # Prometheus /metrics endpoint
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - METRICS_ADDR=:9081
      - PROXY_ADDR=:9080
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9081/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3

  # -------------------------------------------------------------------------
  # Control plane — orchestrates VM lifecycle and proxies LLM calls.
  # API keys live here; they never enter the sandbox VM.
  # -------------------------------------------------------------------------
  control-plane:
    build:
      context: ./control-plane
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgres://enclaiv:enclaiv@db:5432/enclaiv?sslmode=disable
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - PROXY_ADDR=proxy:9080
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -------------------------------------------------------------------------
  # PostgreSQL 16 — persistent state (sessions, audit logs, policies).
  # -------------------------------------------------------------------------
  db:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: enclaiv
      POSTGRES_PASSWORD: enclaiv
      POSTGRES_DB: enclaiv
    volumes:
      - db_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U enclaiv -d enclaiv"]
      interval: 5s
      timeout: 3s
      retries: 10

  # -------------------------------------------------------------------------
  # Prometheus — scrapes proxy /metrics and control-plane /metrics.
  # -------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    depends_on:
      - proxy
      - control-plane
    restart: unless-stopped

  # -------------------------------------------------------------------------
  # Grafana — dashboards for observability.
  # -------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_ANALYTICS_REPORTING_ENABLED=false
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

# ---------------------------------------------------------------------------
# Named volumes
# ---------------------------------------------------------------------------
volumes:
  db_data:
  prometheus_data:
  grafana_data:
